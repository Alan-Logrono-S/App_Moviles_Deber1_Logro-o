<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Notas EPN</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Notas EPN</h1>
        <form id="notaForm">
            <label for="bimestre1">Nota Bimestre 1 (sobre 20):</label>
            <input type="number" id="bimestre1" name="bimestre1" min="0" max="20" step="0.01" required>

            <label for="bimestre2">Nota Bimestre 2 (sobre 20):</label>
            <input type="number" id="bimestre2" name="bimestre2" min="0" max="20" step="0.01" required>

            <button type="submit">Calcular</button>
        </form>
        <div id="resultado"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
